name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: [self-hosted, windows, vpn]

    defaults:
      run:
        shell: powershell

    env:
      ECOURT_USERNAME: ${{ secrets.ECOURT_USERNAME }}
      ECOURT_PASSWORD: ${{ secrets.ECOURT_PASSWORD }}
      CMS_STG_USERNAME: ${{ secrets.CMS_STG_USERNAME }}
      CMS_STG_PASSWORD: ${{ secrets.CMS_STG_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install

    - name: Run Playwright tests
      run: .\scripts\run-selected-tests.ps1 -Root "${{ github.workspace }}"

    - name: Ensure summary file exists
      run: |
        if (!(Test-Path "test_summary.md")) {
          "No summary generated" | Out-File test_summary.md
        }

    # ✅ ✅ FIXED HTML HERE
    - name: Convert summary to HTML (Dashboard UI)
      run: |
        $content = Get-Content test_summary.md -Raw
        $content = $content -replace "`n","<br>"

        $html = "<html><head>
        <meta charset='UTF-8'>
        <title>Test Summary Dashboard</title>
        <style>
          body { font-family: Segoe UI, Arial; margin:0; background:#f4f6f8; }
          .header { background:#2c3e50; color:white; padding:20px; font-size:22px; }
          .container { padding:30px; }
          .card { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        </style>
        </head><body>"

        $html += "<div class='header'>CMS, eCourt & eEDocs Test Dashboard</div>"
        $html += "<div class='container'>"
        $html += "<div class='card'>"
        $html += "<h2>Latest Test Summary</h2>"
        $html += "<p>$content</p>"
        $html += "</div></div>"
        $html += "</body></html>"

        $html | Out-File -FilePath index.html -Encoding utf8

    - name: Upload site artifact
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: index.html

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Download site
      uses: actions/download-artifact@v4
      with:
        name: site
        path: public

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
