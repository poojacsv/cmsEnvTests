name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: [self-hosted, windows, vpn]

    env:
      ECOURT_USERNAME: ${{ secrets.ECOURT_USERNAME }}
      ECOURT_PASSWORD: ${{ secrets.ECOURT_PASSWORD }}
      CMS_STG_USERNAME: ${{ secrets.CMS_STG_USERNAME }}
      CMS_STG_PASSWORD: ${{ secrets.CMS_STG_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # optional if already installed on runner
    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Run Playwright tests
      run: npx playwright test --project=chrome

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Send success email with report
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.office365.com
        server_port: 587
        secure: false
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}

        subject: "✅ Playwright Tests Passed - ${{ github.repository }}"
        to: pooja.arora@courts.vic.gov.au
        from: "Pooja Arora <pooja.arora@courts.vic.gov.au>"

        body: |
          Hi Team,

          ✔ Playwright test execution completed successfully.

          📌 Repository: ${{ github.repository }}
          📌 Branch: ${{ github.ref_name }}
          📌 Commit: ${{ github.sha }}
          📌 Run ID: ${{ github.run_id }}

          📊 Status: SUCCESS

          🔗 View full run:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          📎 Test report is available in GitHub Actions artifacts.
