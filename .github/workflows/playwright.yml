name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: [self-hosted, windows, vpn]

    defaults:
      run:
        shell: powershell

    env:
      ECOURT_USERNAME: ${{ secrets.ECOURT_USERNAME }}
      ECOURT_PASSWORD: ${{ secrets.ECOURT_PASSWORD }}
      CMS_STG_USERNAME: ${{ secrets.CMS_STG_USERNAME }}
      CMS_STG_PASSWORD: ${{ secrets.CMS_STG_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install

    # ✅ Ensure HTML report is generated
    - name: Run Playwright tests
      run: npx playwright test --reporter=html

    - name: Verify report exists
      run: |
        if (Test-Path "playwright-report/index.html") {
          Write-Output "✅ Report found"
        } else {
          Write-Error "❌ Report missing"
          exit 1
        }

    - uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/

  # ✅ ✅ NEW JOB (this was missing)
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Download report artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: playwright-report

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4