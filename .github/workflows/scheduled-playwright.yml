name: Scheduled Playwright Tests

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

jobs:
  test:
    timeout-minutes: 60
    runs-on: [self-hosted, windows, vpn]

    defaults:
      run:
        shell: powershell

    env:
      ECOURT_USERNAME: ${{ secrets.ECOURT_USERNAME }}
      ECOURT_PASSWORD: ${{ secrets.ECOURT_PASSWORD }}
      CMS_STG_USERNAME: ${{ secrets.CMS_STG_USERNAME }}
      CMS_STG_PASSWORD: ${{ secrets.CMS_STG_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install

    - name: Run Playwright tests (headless)
      run: .\scripts\run-selected-tests.ps1 -Root "${{ github.workspace }}"

    # ✅ KEEP this (GitHub UI summary)
    - name: Show test summary
      if: ${{ !cancelled() }}
      run: |
        if (Test-Path test_summary.md) {
          Get-Content test_summary.md | Add-Content $env:GITHUB_STEP_SUMMARY
        } else {
          "test_summary.md was not generated." | Add-Content $env:GITHUB_STEP_SUMMARY
        }

    # ✅ ✅ NEW STEP (THIS IS THE IMPORTANT FIX)
    - name: Print test summary to logs (for email → Teams)
      if: ${{ !cancelled() }}
      run: |
        Write-Output "PLAYWRIGHT_RESULT_START"

        if (Test-Path test_summary.md) {
          Get-Content test_summary.md
        } else {
          Write-Output "test_summary.md was not generated."
        }

        Write-Output "PLAYWRIGHT_RESULT_END"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-summary
        path: test_summary.md
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30