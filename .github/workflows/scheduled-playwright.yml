name: Scheduled Playwright Tests

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

# ✅ REQUIRED for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: [self-hosted, windows, vpn]

    defaults:
      run:
        shell: powershell

    env:
      ECOURT_USERNAME: ${{ secrets.ECOURT_USERNAME }}
      ECOURT_PASSWORD: ${{ secrets.ECOURT_PASSWORD }}
      CMS_STG_USERNAME: ${{ secrets.CMS_STG_USERNAME }}
      CMS_STG_PASSWORD: ${{ secrets.CMS_STG_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install

    # ✅ Ensure HTML report is generated
    - name: Run Playwright tests (headless)
      run: |
        .\scripts\run-selected-tests.ps1 -Root "${{ github.workspace }}"
        npx playwright test --reporter=html

    # ✅ GitHub UI summary
    - name: Show test summary
      if: ${{ !cancelled() }}
      run: |
        if (Test-Path test_summary.md) {
          Get-Content test_summary.md | Add-Content $env:GITHUB_STEP_SUMMARY
        } else {
          "test_summary.md was not generated." | Add-Content $env:GITHUB_STEP_SUMMARY
        }

    # ✅ Log output for email/Teams
    - name: Print test summary to logs (for email → Teams)
      if: ${{ !cancelled() }}
      run: |
        Write-Output "PLAYWRIGHT_RESULT_START"

        if (Test-Path test_summary.md) {
          Get-Content test_summary.md
        } else {
          Write-Output "test_summary.md was not generated."
        }

        Write-Output "PLAYWRIGHT_RESULT_END"

    - name: Print workflow run URL
      run: |
        Write-Output "RUN_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    # ✅ Upload artifacts (still useful internally)
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-summary
        path: test_summary.md
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # ✅ ✅ NEW: Publish Playwright report publicly

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload Playwright report to Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    # ✅ Add public link in summary
    - name: Add public report link to summary
      run: |
        echo "### 🌐 Public Test Report" >> $env:GITHUB_STEP_SUMMARY
        echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $env:GITHUB_STEP_SUMMARY